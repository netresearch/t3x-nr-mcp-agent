services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Netresearch\NrMcpAgent\:
    resource: '../Classes/*'

  Netresearch\NrMcpAgent\Controller\ChatModuleController:
    public: true

  Netresearch\NrMcpAgent\Controller\ChatApiController:
    public: true

  # Processor: defaults to exec, override for worker mode
  Netresearch\NrMcpAgent\Service\ChatProcessorInterface:
    class: Netresearch\NrMcpAgent\Service\ExecChatProcessor

  # MCP Tool Provider interface alias
  Netresearch\NrMcpAgent\Mcp\McpToolProviderInterface:
    class: Netresearch\NrMcpAgent\Mcp\McpToolProvider

  # Register nr_mcp_agent_tools cache as a DI service via CacheManager factory
  cache.nr_mcp_agent_tools:
    class: 'TYPO3\CMS\Core\Cache\Frontend\FrontendInterface'
    factory: ['@TYPO3\CMS\Core\Cache\CacheManager', 'getCache']
    arguments:
      $identifier: 'nr_mcp_agent_tools'

  # Inject the MCP tools cache frontend into McpToolProvider
  Netresearch\NrMcpAgent\Mcp\McpToolProvider:
    arguments:
      $cache: '@cache.nr_mcp_agent_tools'

  # Document extractors — tagged for DocumentExtractorRegistry
  Netresearch\NrMcpAgent\Document\DocumentExtractorRegistry:
    arguments:
      - !tagged_iterator document.extractor

  Netresearch\NrMcpAgent\Document\Extractor\PdfExtractor:
    tags: ['document.extractor']

  Netresearch\NrMcpAgent\Document\Extractor\DocxExtractor:
    tags: ['document.extractor']

  Netresearch\NrMcpAgent\Document\Extractor\XlsxExtractor:
    tags: ['document.extractor']

  Netresearch\NrMcpAgent\Document\Extractor\PlainTextExtractor:
    tags: ['document.extractor']
