# Main site — HTTP (used by DDEV health check)
<VirtualHost *:80>
    ServerName nr-mcp-agent.ddev.site
    DocumentRoot /var/www/html
    <Directory "/var/www/html">
        AllowOverride All
        Require all granted
    </Directory>
    RewriteEngine On
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteRule ^ - [env=HTTPS:on]
    # Required for DDEV health check
    Alias "/phpstatus" "/var/www/phpstatus.php"
</VirtualHost>

# Main site — HTTPS
<VirtualHost *:443>
    ServerName nr-mcp-agent.ddev.site
    DocumentRoot /var/www/html
    <Directory "/var/www/html">
        AllowOverride All
        Require all granted
    </Directory>
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/master.crt
    SSLCertificateKeyFile /etc/ssl/certs/master.key
</VirtualHost>

