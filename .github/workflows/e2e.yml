name: E2E Tests

# E2E tests require a running TYPO3 instance.
# Triggered manually via workflow_dispatch or automatically on pushes to main.
# For local runs: make test-e2e (requires DDEV)
on:
  workflow_dispatch:
    inputs:
      typo3_base_url:
        description: 'TYPO3 base URL (defaults to DDEV site)'
        required: false
        default: 'https://v13.nr-mcp-agent.ddev.site:33001'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: typo3
          MYSQL_USER: typo3
          MYSQL_PASSWORD: typo3
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo_mysql
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        run: composer require --no-interaction typo3/cms-core:"^13.4" typo3/cms-backend:"^13.4" -W --no-progress

      - name: Install TYPO3
        env:
          TYPO3_DB_HOST: 127.0.0.1
          TYPO3_DB_PORT: 3306
          TYPO3_DB_NAME: typo3
          TYPO3_DB_USERNAME: typo3
          TYPO3_DB_PASSWORD: typo3
        run: |
          .Build/bin/typo3 setup \
            --driver=mysqli \
            --host=127.0.0.1 \
            --port=3306 \
            --dbname=typo3 \
            --username=typo3 \
            --password=typo3 \
            --admin-user-name=admin \
            --admin-password=Admin1234! \
            --project-name="nr-mcp-agent E2E" \
            --no-interaction
          .Build/bin/typo3 extension:setup
          .Build/bin/typo3 database:updateschema

      - name: Start PHP built-in server
        run: |
          php -S 127.0.0.1:8080 -t .Build/Web &
          echo "PHP server started"
          sleep 2

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          TYPO3_BASE_URL: ${{ github.event.inputs.typo3_base_url || 'http://127.0.0.1:8080' }}
        run: npx playwright test --config=Build/tests/playwright/playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
